events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Disabilita versione nginx nelle response headers
    server_tokens off;

    # Upstream dei servizi backend
    upstream pipeline_service  { server pipeline-service:8001; }
    upstream results_service   { server results-service:8002; }
    upstream scheduler_service { server scheduler-service:8003; }
    upstream frontend          { server frontend:3000; }
    upstream dashboard         { server dashboard:8501; }

    server {
        listen 80;
        server_name _;

        # ── API routing ────────────────────────────────────────────────────────

        location /api/pipeline/ {
            proxy_pass         http://pipeline_service/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 600s;   # la pipeline può durare minuti
            proxy_send_timeout 600s;
        }

        location /api/results/ {
            proxy_pass         http://results_service/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            # Download file grandi: nessun buffer
            proxy_buffering    off;
        }

        location /api/scheduler/ {
            proxy_pass         http://scheduler_service/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Streamlit dashboard ────────────────────────────────────────────────
        # Streamlit richiede supporto WebSocket per la comunicazione bidirezionale
        # tra browser e server (aggiornamenti live dei grafici, interazioni UI).
        location /dashboard/ {
            proxy_pass         http://dashboard/dashboard/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket — obbligatorio per Streamlit
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # Timeout elevato: la connessione WebSocket rimane aperta
            # finché l'utente ha la dashboard aperta nel browser.
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Frontend SPA ───────────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            # SPA: il container frontend serve già try_files $uri /index.html
        }
    }
}
